{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – MindSpace</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #ffffff;
  color: #313131;
}

.forgot-page {
  width: 100%;
  height: 100dvh;
  display: grid;
  grid-template-columns: minmax(320px, 480px) minmax(360px, 540px);
  align-items: center;
  justify-content: center;
  gap: clamp(28px, 5vw, 70px);
  padding: clamp(16px, 3vw, 42px);
  overflow: hidden;
}

.forgot-left {
  width: 100%;
  max-width: 460px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: clamp(11px, 1.5vh, 13px);
  color: #313131;
  text-decoration: none;
  margin-bottom: clamp(14px, 2.5vh, 24px);
}

.forgot-title {
  font-size: clamp(25px, 4.6vh, 38px);
  font-weight: 700;
  margin-bottom: clamp(8px, 1.6vh, 14px);
  color: #313131;
  line-height: 1.15;
}

.forgot-sub {
  font-size: clamp(12px, 1.8vh, 15px);
  line-height: 1.6;
  color: #717171;
  margin-bottom: clamp(18px, 3vh, 30px);
  max-width: 430px;
}

.message {
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 13px;
}

.message.success {
  background: #e7f6ee;
  color: #14532d;
}

.message.error {
  background: #fee2e2;
  color: #991b1b;
}

.form-group {
  position: relative;
  margin-bottom: clamp(14px, 2.5vh, 22px);
}

.form-group input {
  width: 100%;
  height: clamp(42px, 6vh, 54px);
  border: 1px solid #79747e;
  border-radius: 8px;
  padding: 14px 16px;
  font-size: clamp(12px, 1.7vh, 15px);
  color: #1c1b1f;
  background: #fff;
  outline: none;
}

.form-group input:focus {
  border-color: #113a36;
  box-shadow: 0 0 0 4px rgba(17, 58, 54, .12);
}

.form-group label {
  position: absolute;
  top: -10px;
  left: 12px;
  background: #fff;
  padding: 0 5px;
  font-size: clamp(11px, 1.5vh, 13px);
  color: #313131;
}

.submit-btn {
  width: 100%;
  height: clamp(40px, 5.8vh, 50px);
  background: #113a36;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: clamp(12px, 1.7vh, 14px);
  font-weight: 600;
  cursor: pointer;
  margin-bottom: clamp(16px, 3vh, 26px);
}

.submit-btn:hover {
  opacity: 0.9;
}

.divider {
  display: flex;
  align-items: center;
  gap: 14px;
  color: #8d8d8d;
  font-size: clamp(11px, 1.5vh, 13px);
  margin-bottom: clamp(14px, 2.5vh, 24px);
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #e0e0e0;
}

.google-btn {
  width: 100%;
  height: clamp(40px, 5.8vh, 48px);
  border: 1px solid #113a36;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  color: #113a36;
}

.forgot-right {
  display: flex;
  justify-content: center;
  align-items: center;
}

.image-card {
  width: min(100%, 500px);
  height: min(78dvh, 620px);
  border-radius: clamp(18px, 3vw, 26px);
  overflow: hidden;
  background: #f0f0f0;
  box-shadow: 0 24px 70px rgba(0,0,0,.18);
}

.image-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Small laptop height */
@media (max-height: 720px) {
  .forgot-page {
    padding: 18px 32px;
    gap: 36px;
  }

  .forgot-title {
    font-size: 30px;
  }

  .forgot-sub {
    margin-bottom: 18px;
  }

  .image-card {
    height: 560px;
  }
}

/* Tablet and mobile */
@media (max-width: 900px) {
  html,
  body {
    overflow: auto;
  }

  .forgot-page {
    min-height: 100dvh;
    height: auto;
    grid-template-columns: 1fr;
    padding: 28px 22px;
  }

  .forgot-left {
    max-width: 480px;
    margin: 0 auto;
  }

  .forgot-right {
    display: none;
  }
}

/* Mobile */
@media (max-width: 480px) {
  .forgot-page {
    padding: 22px 16px;
  }

  .forgot-title {
    font-size: 26px;
  }

  .forgot-sub {
    font-size: 13px;
  }
}
  </style>
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>

<body>

<main class="forgot-page">

  <section class="forgot-left">
    <a href="{% url 'login' %}" class="back-link">‹ Back to login</a>

    <h1 class="forgot-title">Forgot your password?</h1>
    <p class="forgot-sub">
      Don’t worry, happens to all of us. Enter your email below to recover your password.
    </p>

    {% if messages %}
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <input type="email" id="email" name="email" placeholder="john.doe@gmail.com" required>
        <label for="email">Email</label>
      </div>

      <button type="submit" class="submit-btn">Submit</button>
    </form>

    <div class="divider">Or login with</div>

    <button type="button" class="google-btn">G</button>
  </section>

  <section class="forgot-right">
    <div class="image-card">
      <img src="https://www.figma.com/api/mcp/asset/cf145829-953a-4bf7-99c1-ff98cd5b03ce" alt="Password reset illustration">
    </div>
  </section>

</main>

</body>
</html>

{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up – MindSpace</title>

  <style>
    :root {
      --clr-brand-900: #113a36;
      --clr-brand-800: #143b33;
      --clr-brand-700: #1a3e39;
      --clr-brand-600: #2d5a45;
      --clr-brand-500: #3a5e4e;
      --clr-brand-400: #6b8a7a;
      --clr-brand-100: #d7e4c9;

      --clr-white: #ffffff;
      --clr-black: #000000;
      --clr-gray-900: #313131;
      --clr-gray-700: #717171;
      --clr-gray-500: #8d8d8d;
      --clr-gray-300: #d9d9d9;

      --clr-error: #b91c1c;
      --font-primary: 'Poppins', sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font-primary);
      color: #0f1125;
      background: var(--clr-white);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    input,
    select {
      font-family: inherit;
      outline: none;
    }

    .auth-page {
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2vw, 20px);
      position: relative;
      overflow: hidden;

      background:
        radial-gradient(circle at top left, rgba(215, 228, 201, .7), transparent 35%),
        linear-gradient(135deg, #0f3a34 0%, #193f38 45%, #f7faf6 45%, #ffffff 100%);
    }

    .auth-page__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .15;
      filter: blur(2px);
      z-index: 0;
    }

    .auth-page__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(17,58,54,.8), rgba(17,58,54,.3));
      z-index: 1;
    }

    .auth-page::before,
    .auth-page::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      z-index: 1;
    }

    .auth-page::before {
      width: clamp(200px, 30vw, 380px);
      height: clamp(200px, 30vw, 380px);
      background: rgba(215, 228, 201, .25);
      top: -120px;
      right: -100px;
    }

    .auth-page::after {
      width: clamp(140px, 20vw, 240px);
      height: clamp(140px, 20vw, 240px);
      background: rgba(255,255,255,.2);
      bottom: -80px;
      left: -60px;
    }

    .auth-card {
      position: relative;
      z-index: 2;
      width: min(92vw, 440px);
      max-height: calc(100dvh - 24px);
      padding: clamp(16px, 2.5vh, 26px) clamp(20px, 2.5vw, 32px);
      border-radius: 22px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .auth-card::before {
      content: "MindSpace";
      display: inline-flex;
      align-self: flex-start;
      padding: 6px 12px;
      margin-bottom: 8px;
      border-radius: 999px;
      background: #edf5e8;
      font-size: 11px;
      font-weight: 700;
      color: var(--clr-brand-900);
    }

    .auth-card__title {
      font-size: clamp(22px, 3.2vh, 30px);
      font-weight: 700;
      color: #10231f;
      margin-bottom: 4px;
    }

    .auth-card__title::after {
      content: "Create your secure account to continue your wellness journey.";
      display: block;
      margin-top: 6px;
      font-size: clamp(11px, 1.6vh, 13px);
      color: #647067;
      line-height: 1.4;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.2vh, 10px);
      margin-top: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field label {
      font-size: clamp(10px, 1.4vh, 12px);
      font-weight: 600;
      color: #243b35;
    }

    .field input,
    .field select {
      width: 100%;
      height: clamp(34px, 4.8vh, 42px);
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid #dce4dc;
      background: #fbfdfb;
      font-size: clamp(11px, 1.5vh, 13px);
      color: #1f2f2b;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--clr-brand-900);
      box-shadow: 0 0 0 3px rgba(17,58,54,.12);
      background: #ffffff;
    }

    .auth-check {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: clamp(10px, 1.3vh, 11px);
      color: #53605b;
      line-height: 1.45;
    }

    .auth-check input {
      width: 13px;
      height: 13px;
      margin-top: 2px;
      flex: 0 0 13px;
      accent-color: var(--clr-brand-900);
    }

    .btn--auth {
      width: 100%;
      height: clamp(34px, 5vh, 44px);
      border-radius: 12px;
      background: linear-gradient(135deg, #113a36, #2d5a45);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #313131;
      font-size: 10px;
      opacity: .65;
      margin: 8px 0 0;
    }

    .or-divider::before,
    .or-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #313131;
      opacity: .35;
    }

    .google-form {
      margin-top: 8px;
    }

    .google-btn {
      width: 100%;
      height: clamp(34px, 5vh, 44px);
      border: 1px solid #d7e2dc;
      border-radius: 12px;
      background: #ffffff;
      color: #18352c;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
    }

    .google-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      display: block;
    }

    .auth-switch {
      margin-top: 10px;
      font-size: clamp(10px, 1.3vh, 12px);
      text-align: center;
      color: #4d5b56;
    }

    .auth-switch a {
      color: var(--clr-brand-900);
      font-weight: 700;
    }

    .message {
      padding: 10px 12px;
      border-radius: 10px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
    }

    @media (max-height: 720px) {
      .auth-card {
        width: min(90vw, 420px);
        padding: 14px 26px;
      }

      .auth-form {
        gap: 5px;
      }

      .field input,
      .field select,
      .btn--auth,
      .google-btn {
        height: 32px;
      }

      .google-form {
        margin-top: 6px;
      }

      .auth-switch {
        margin-top: 6px;
      }
    }

    @media (max-width: 480px) {
      .auth-card {
        width: 100%;
        padding: 16px;
        border-radius: 18px;
      }

      .auth-card__title {
        font-size: 22px;
      }
    }
  </style>
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>

<body>

<div class="auth-page">
  <img
    class="auth-page__bg"
    src="{% static 'images/signup_login_bg.png' %}"
    alt=""
    aria-hidden="true"
  />

  <div class="auth-page__overlay"></div>

  <div class="auth-card">

    {% if messages %}
      {% for message in messages %}
        <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <h1 class="auth-card__title">Get Started Now</h1>

    <!-- Normal MindSpace signup form -->
    <form class="auth-form" method="POST" action="{% url 'signup' %}">
      {% csrf_token %}

      <div class="field">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          autocomplete="name"
          required
        >
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
          required
        >
      </div>

      <div class="field">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="user">User</option>
          <option value="counselor">Counselor</option>
        </select>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Create a password"
          autocomplete="new-password"
          required
        >
      </div>

      <div class="field">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Re-enter password"
          autocomplete="new-password"
          required
        >
      </div>

      <label class="auth-check">
        <input type="checkbox" name="terms" required>
        <span>
          I agree to the
          <a href="#" style="text-decoration:underline;">terms &amp; policy</a>
        </span>
      </label>

      <button type="submit" class="btn--auth">Signup</button>
    </form>

    <div class="or-divider">Or</div>

    <!-- Google signup/login form: POST avoids ugly allauth confirmation page -->
    <form method="POST" action="{% provider_login_url 'google' %}" class="google-form">
      {% csrf_token %}
      <button type="submit" class="google-btn">
        <img src="{% static 'images/google-logo.svg' %}" alt="Google" class="google-icon">
        <span>Continue with Google</span>
      </button>
    </form>

    <p class="auth-switch">
      Have an account?
      <a href="{% url 'login' %}">Login</a>
    </p>

  </div>
</div>

</body>
</html>
